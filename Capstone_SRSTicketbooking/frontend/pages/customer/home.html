<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Events — EventHive</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        /* hero section at the top */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 50px 40px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .hero-text h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .hero-text h1 span {
            color: #e94560;
        }

        .hero-text p {
            color: #aaa;
            font-size: 15px;
            max-width: 460px;
        }

        /* search bar inside hero */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .search-bar input {
            padding: 11px 18px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            width: 300px;
            outline: none;
            font-family: inherit;
        }

        .search-bar button {
            padding: 11px 22px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .search-bar button:hover {
            background-color: #c73652;
        }

        /* stats row inside hero */
        .hero-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: center;
        }

        .stat-box {
            background-color: rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 16px 28px;
        }

        .stat-box h3 {
            font-size: 26px;
            font-weight: 800;
            color: #e94560;
        }

        .stat-box p {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        /* section title above the grid */
        .section-title {
            padding: 28px 40px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .section-title span {
            font-size: 13px;
            color: #6c757d;
        }

        /* event card image placeholder */
        .event-card-banner {
            height: 140px;
            background: linear-gradient(135deg, #0f3460, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        /* available seats color logic */
        .seats-low {
            color: #dc3545;
            font-weight: 600;
        }

        .seats-ok {
            color: #28a745;
        }

        /* no results message */
        .no-results {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 15px;
            display: none;
        }
    </style>
</head>
<body>

<!-- navbar injected by auth.js -->

<!-- HERO SECTION -->
<div class="hero">
    <div class="hero-text">
        <h1>Discover <span>Amazing</span> Events</h1>
        <p>Browse and book tickets for the best events happening near you.</p>

        <div class="search-bar">
            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by event name or venue..."
                    oninput="filterEvents()"
            />
            <button onclick="filterEvents()">Search</button>
        </div>
    </div>

    <div class="hero-stats">
        <div class="stat-box">
            <h3 id="totalEventsCount">0</h3>
            <p>Live Events</p>
        </div>
        <div class="stat-box">
            <h3>🎟️</h3>
            <p>Book Instantly</p>
        </div>
    </div>
</div>

<!-- EVENTS SECTION -->
<div class="section-title">
    <h2>Upcoming Events</h2>
    <span id="resultsCount"></span>
</div>

<!-- loader shown while fetching -->
<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading events...</p>
</div>

<!-- error message -->
<div id="alertBox" class="alert alert-error" style="margin: 0 40px;"></div>

<!-- no results -->
<div class="no-results" id="noResults">
    No events found matching your search.
</div>

<!-- events grid — cards injected here by JS -->
<div class="events-grid" id="eventsGrid"></div>

<!-- footer -->
<div class="footer">
    &copy; 2026 <span>EventHive</span>. All rights reserved.
</div>

<script src="../../js/utils.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/api.js"></script>
<script>

    // protect this page — must be logged in as customer
    requireRole("CUSTOMER");

    // build navbar with "home" as active link
    buildNavbar("home");

    // store all events so we can filter without re-fetching
    let allEvents = [];

    // load events when page opens
    window.onload = async function () {
        showLoader("loader");

        try {
            const events = await getAllEvents();

            if (events._status === 200 || Array.isArray(events)) {
                // getAllEvents returns array directly
                allEvents = Array.isArray(events) ? events : [];
                renderEvents(allEvents);
                document.getElementById("totalEventsCount").textContent = allEvents.length;
            } else {
                showAlert("alertBox", "Failed to load events. Please try again.", "error");
            }

        } catch (err) {
            showAlert("alertBox", "Something went wrong. Please refresh.", "error");
        }

        hideLoader("loader");
    };

    // render event cards into the grid
    function renderEvents(events) {
        const grid = document.getElementById("eventsGrid");
        const noResults = document.getElementById("noResults");
        const resultsCount = document.getElementById("resultsCount");

        grid.innerHTML = "";

        if (events.length === 0) {
            noResults.style.display = "block";
            resultsCount.textContent = "";
            return;
        }

        noResults.style.display = "none";
        resultsCount.textContent = events.length + " event(s) found";

        events.forEach(function (event) {
            const seatsClass = event.availableSeats <= 10 ? "seats-low" : "seats-ok";
            const seatsText  = event.availableSeats <= 10
                ? "⚠️ Only " + event.availableSeats + " seats left!"
                : event.availableSeats + " seats available";

            const card = `
                <div class="card" onclick="goToEvent(${event.id})" style="cursor: pointer;">
                    <div class="event-card-banner">🎉</div>
                    <div class="card-body">
                        <div class="event-card-date">${formatDateTime(event.eventDate)}</div>
                        <div class="card-title">${event.name}</div>
                        <div class="card-text event-card-venue">📍 ${event.venue}</div>
                        <div class="card-text mt-10">${truncate(event.description, 80)}</div>
                    </div>
                    <div class="card-footer">
                        <div>
                            <div class="event-card-price">${formatCurrency(event.ticketPrice)}</div>
                            <div class="event-card-seats ${seatsClass}">${seatsText}</div>
                        </div>
                        <button class="btn btn-primary btn-sm"
                            onclick="event.stopPropagation(); goToEvent(${event.id})">
                            Book Now
                        </button>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    // filter events based on search input
    function filterEvents() {
        const query = document.getElementById("searchInput").value.toLowerCase().trim();

        if (!query) {
            renderEvents(allEvents);
            return;
        }

        const filtered = allEvents.filter(function (event) {
            return event.name.toLowerCase().includes(query) ||
                   event.venue.toLowerCase().includes(query);
        });

        renderEvents(filtered);
    }

    // navigate to event details page
    function goToEvent(eventId) {
        window.location.href = "event-details.html?id=" + eventId;
    }

    // truncate long descriptions
    function truncate(text, maxLength) {
        if (!text) return "";
        return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
    }

</script>

</body>
</html>
